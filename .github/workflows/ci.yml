name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  ci:
    name: Lint, build, and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run protocol codegen
        run: pnpm codegen

      - name: Verify generated files are committed
        run: |
          git diff --exit-code || (
            echo "Generated files are out of date. Run 'pnpm codegen' and commit the changes."
            exit 1
          )

      - name: Lint TypeScript/JSON/CSS with Biome
        run: pnpm lint

      - name: Build VS Code extension
        run: pnpm --filter @vocode/vscode-extension build

      - name: Build daemon
        run: pnpm --filter @vocode/daemon build

      - name: Run Go tests
        run: go test ./...
